<!DOCTYPE html>
<html>
<head>
    <title>Webhook Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        #result { margin-top: 20px; background: #f0f0f0; padding: 15px; border-radius: 5px; }
        .url { word-break: break-all; background: #fff; padding: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>🔗 Webhook URL Generator</h1>
    <p>Click the button to create a unique webhook endpoint.</p>
    <button id="generate">Generate New Webhook URL</button>
    
    <div id="result" style="display:none;">
        <h2>Your webhook URL:</h2>
        <div class="url" id="webhookUrl"></div>
        <p>Use this URL in your scripts (POST requests).</p>
        <p>View received data: <a id="viewLink" href="#" target="_blank">open viewer</a></p>
    </div>

    <script>
        document.getElementById('generate').addEventListener('click', async () => {
            const res = await fetch('/generate', { method: 'POST' });
            const data = await res.json();
            
            // Build full URLs (assuming same origin)
            const base = window.location.origin;
            document.getElementById('webhookUrl').textContent = base + data.webhookUrl;
            document.getElementById('viewLink').href = base + data.viewUrl;
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
